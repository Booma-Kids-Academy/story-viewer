<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booma Story Viewer — The Salem Adventures</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg: #FDF6EE;
  --surface: #FFFFFF;
  --surface-hover: #FFF8F0;
  --border: #E8DDD0;
  --border-light: #F0E8DC;
  --text: #2D2A26;
  --text-secondary: #6B6560;
  --text-tertiary: #9B9590;
  --accent: #D4654A;
  --accent-hover: #C05A42;
  --accent-light: #FFF0EC;
  --olive: #5C7A5E;
  --olive-light: #EDF4ED;
  --gold: #C4943A;
  --gold-light: #FFF8E8;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.1), 0 4px 8px rgba(0,0,0,0.04);
  --transition: 200ms ease;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  overflow: hidden;
}

.app {
  display: grid;
  grid-template-columns: 340px 1fr;
  height: 100vh;
}

/* ─── Sidebar ─── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
}

.sidebar-header h1 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-header h1 .logo {
  width: 28px;
  height: 28px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 14px;
  font-weight: 700;
}

.sidebar-header p {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 4px;
}

.story-count {
  padding: 12px 20px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-tertiary);
  border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
}

.story-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.story-card {
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--transition), box-shadow var(--transition);
  margin-bottom: 4px;
  border: 1px solid transparent;
}

.story-card:hover {
  background: var(--surface-hover);
}

.story-card.active {
  background: var(--accent-light);
  border-color: var(--accent);
}

.story-card .title-ar {
  font-family: 'Amiri', serif;
  font-size: 18px;
  font-weight: 700;
  direction: rtl;
  text-align: right;
  color: var(--text);
  line-height: 1.5;
}

.story-card .title-en {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.story-card .meta-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}

.tag {
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 100px;
  white-space: nowrap;
}

.tag-template {
  background: var(--olive-light);
  color: var(--olive);
}

.tag-pages {
  background: var(--gold-light);
  color: var(--gold);
}

.tag-date {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-left: auto;
}

/* ─── Main Area ─── */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.main-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  flex-direction: column;
  gap: 12px;
  color: var(--text-tertiary);
}

.main-empty .icon {
  font-size: 48px;
  opacity: 0.3;
}

.main-empty p {
  font-size: 15px;
}

/* ─── Story Header ─── */
.story-header {
  padding: 20px 32px 16px;
  border-bottom: 1px solid var(--border-light);
  background: var(--surface);
  flex-shrink: 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.story-title-block {}

.story-title-block .title-ar {
  font-family: 'Amiri', serif;
  font-size: 28px;
  font-weight: 700;
  direction: rtl;
  text-align: right;
  color: var(--text);
  line-height: 1.4;
}

.story-title-block .title-en {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.story-header-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  align-items: center;
}

.btn-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  color: var(--text-secondary);
  font-size: 18px;
}

.btn-icon:hover {
  background: var(--surface-hover);
  border-color: var(--accent);
  color: var(--accent);
}

.btn-icon.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.btn-icon-danger:hover {
  background: #FEE;
  border-color: #D33;
  color: #D33;
}

/* ─── Confirm Dialog ─── */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
}

.confirm-dialog {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 28px 32px;
  max-width: 400px;
  width: 90%;
}

.confirm-dialog h3 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 8px;
}

.confirm-dialog p {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 20px;
  line-height: 1.5;
}

.confirm-dialog .actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.btn-danger {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: #D33;
  color: white;
}

.btn-danger:hover { background: #B22; }

.btn-cancel {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
}

.btn-cancel:hover { background: var(--surface-hover); }

/* ─── Token Prompt ─── */
.token-input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: monospace;
  margin-bottom: 8px;
}

.token-hint {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-bottom: 16px;
}

/* ─── Page Viewer ─── */
.page-viewer {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.page-content {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px 32px 32px;
  overflow-y: auto;
}

.page-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  max-width: 680px;
  width: 100%;
  padding: 48px 40px;
  position: relative;
  transition: opacity 0.3s ease, transform 0.3s ease;
}

.page-card.fade-out {
  opacity: 0;
  transform: translateY(8px);
}

.page-card.fade-in {
  opacity: 1;
  transform: translateY(0);
}

/* ─── Top Progress Strip ─── */
.page-progress-strip {
  padding: 10px 32px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.page-progress-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  white-space: nowrap;
}

.page-progress-bar {
  flex: 1;
  height: 4px;
  background: var(--border-light);
  border-radius: 100px;
  overflow: hidden;
}

.page-progress-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 100px;
  transition: width 0.3s ease;
}

.page-text-ar {
  font-family: 'Amiri', serif;
  font-size: 28px;
  line-height: 1.9;
  direction: rtl;
  text-align: right;
  color: var(--text);
  margin-bottom: 24px;
}

.page-text-en {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text-secondary);
  padding-top: 20px;
  border-top: 1px solid var(--border-light);
  font-style: italic;
}

.page-illustration {
  margin-top: 20px;
  padding: 12px 16px;
  background: var(--gold-light);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--gold);
  line-height: 1.5;
  display: none;
}

.page-illustration.visible {
  display: block;
}

.page-illustration strong {
  font-weight: 600;
}

/* ─── Navigation Bar ─── */
.nav-bar {
  padding: 16px 32px;
  background: var(--surface);
  border-top: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.nav-left, .nav-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-center {
  display: flex;
  align-items: center;
  gap: 16px;
}

.btn {
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  border: none;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-primary {
  background: var(--accent);
  color: white;
}

.btn-primary:hover {
  background: var(--accent-hover);
}

.btn-primary:disabled {
  background: var(--border);
  color: var(--text-tertiary);
  cursor: default;
}

.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  background: var(--surface-hover);
  border-color: var(--accent);
}

.btn-secondary:disabled {
  color: var(--text-tertiary);
  cursor: default;
  border-color: var(--border-light);
}

.btn-secondary:disabled:hover {
  background: var(--surface);
  border-color: var(--border-light);
}


/* ─── TTS Controls ─── */
.tts-controls {
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-tts {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  background: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  color: var(--accent);
  font-size: 16px;
}

.btn-tts:hover {
  background: var(--accent);
  color: white;
}

.btn-tts.playing {
  background: var(--accent);
  color: white;
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(212,101,74,0.3); }
  50% { box-shadow: 0 0 0 8px rgba(212,101,74,0); }
}

.btn-tts-auto {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  color: var(--text-secondary);
  transition: all var(--transition);
}

.btn-tts-auto.active {
  background: var(--olive-light);
  border-color: var(--olive);
  color: var(--olive);
}

/* ─── Metadata Panel ─── */
.metadata-panel {
  position: absolute;
  top: 0;
  right: 0;
  width: 360px;
  height: 100%;
  background: var(--surface);
  border-left: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
  transform: translateX(100%);
  transition: transform 0.3s ease;
  z-index: 10;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.metadata-panel.open {
  transform: translateX(0);
}

.metadata-header {
  padding: 20px;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.metadata-header h3 {
  font-size: 15px;
  font-weight: 700;
}

.metadata-close {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 20px;
  color: var(--text-tertiary);
  padding: 4px;
}

.metadata-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.meta-section {
  margin-bottom: 24px;
}

.meta-section h4 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}

.meta-field {
  margin-bottom: 12px;
}

.meta-field label {
  font-size: 12px;
  color: var(--text-tertiary);
  display: block;
  margin-bottom: 2px;
}

.meta-field .value {
  font-size: 14px;
  color: var(--text);
  font-weight: 500;
}

.scores-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.score-item {
  background: var(--bg);
  padding: 10px 12px;
  border-radius: var(--radius-sm);
}

.score-item label {
  font-size: 11px;
  color: var(--text-tertiary);
  display: block;
  margin-bottom: 4px;
}

.score-item .score-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}

.score-item .score-value .max {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-tertiary);
}

.revision-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 600;
}

.revision-badge.direct_approval {
  background: var(--olive-light);
  color: var(--olive);
}

.revision-badge.light_polish {
  background: var(--gold-light);
  color: var(--gold);
}

.revision-badge.substantial_revision {
  background: var(--accent-light);
  color: var(--accent);
}

/* ─── Mobile Sidebar Toggle ─── */
.mobile-toggle {
  display: none;
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 100;
  width: 44px;
  height: 44px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-md);
  cursor: pointer;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: var(--text);
}

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 49;
}

/* ─── Responsive ─── */
@media (max-width: 840px) {
  .app {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 320px;
    height: 100%;
    z-index: 50;
    transform: translateX(-100%);
    transition: transform 0.3s ease;
  }

  .sidebar.open {
    transform: translateX(0);
  }

  .sidebar-overlay.open {
    display: block;
  }

  .mobile-toggle {
    display: flex;
  }

  .story-header {
    padding: 16px 16px 12px;
    padding-left: 64px;
  }

  .page-content {
    padding: 16px;
  }

  .page-card {
    padding: 32px 24px;
  }

  .page-text-ar {
    font-size: 22px;
  }

  .nav-bar {
    padding: 12px 16px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .progress-bar {
    width: 120px;
  }

  .metadata-panel {
    width: 100%;
  }

  .story-title-block .title-ar {
    font-size: 22px;
  }
}

/* ─── Scrollbar styling ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

/* ─── No stories state ─── */
.no-stories {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  padding: 40px 20px;
  text-align: center;
  color: var(--text-tertiary);
  gap: 8px;
}

.no-stories .icon { font-size: 32px; opacity: 0.4; }
.no-stories p { font-size: 13px; }
</style>
</head>
<body>

<button class="mobile-toggle" onclick="toggleSidebar()" aria-label="Toggle story list">&#9776;</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1><span class="logo">B</span> Booma Story Viewer</h1>
      <p>The Salem Adventures — Testing Preview</p>
    </div>
    <div class="story-count" id="storyCount">0 stories</div>
    <div class="story-list" id="storyList"></div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <div class="main-empty" id="emptyState">
      <div class="icon">&#128218;</div>
      <p>Select a story from the sidebar</p>
    </div>
  </main>
</div>

<script>
let stories = [];
let currentStoryIndex = -1;
let currentPage = 0;
let isSpeaking = false;
let autoRead = false;
let metadataOpen = false;
let showIllustrationNotes = false;

const mainEl = document.getElementById('main');
const storyListEl = document.getElementById('storyList');
const storyCountEl = document.getElementById('storyCount');

async function loadStories() {
  try {
    const res = await fetch('stories.json?t=' + Date.now());
    stories = await res.json();
    stories.sort((a, b) => new Date(b.generated_at) - new Date(a.generated_at));
    renderStoryList();
    if (stories.length > 0) selectStory(0);
  } catch (e) {
    storyListEl.innerHTML = '<div class="no-stories"><div class="icon">&#9888;</div><p>Could not load stories.json</p></div>';
  }
}

function renderStoryList() {
  storyCountEl.textContent = `${stories.length} stor${stories.length === 1 ? 'y' : 'ies'}`;
  storyListEl.innerHTML = stories.map((s, i) => {
    const date = new Date(s.generated_at);
    const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const pages = s.story.story_pages.length;
    return `
      <div class="story-card ${i === currentStoryIndex ? 'active' : ''}" onclick="selectStory(${i})" data-index="${i}">
        <div class="title-ar">${s.story.title_arabic}</div>
        <div class="title-en">${s.story.title_english}</div>
        <div class="meta-row">
          <span class="tag tag-template">${s.metadata.selected_template}</span>
          <span class="tag tag-pages">${pages} pages</span>
          <span class="tag-date">${dateStr}</span>
        </div>
      </div>
    `;
  }).join('');
}

function selectStory(index) {
  stopSpeech();
  currentStoryIndex = index;
  currentPage = 0;
  metadataOpen = false;

  document.querySelectorAll('.story-card').forEach((c, i) => {
    c.classList.toggle('active', i === index);
  });

  renderStoryView();

  if (window.innerWidth <= 840) {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
  }
}

function renderStoryView() {
  const s = stories[currentStoryIndex];
  if (!s) return;

  mainEl.innerHTML = `
    <div class="story-header">
      <div class="story-title-block">
        <div class="title-ar">${s.story.title_arabic}</div>
        <div class="title-en">${s.story.title_english}</div>
      </div>
      <div class="story-header-actions">
        <button class="btn-icon" onclick="toggleIllustrationNotes()" title="Toggle illustration notes" id="btnIllNotes">&#128444;</button>
        <button class="btn-icon" onclick="toggleMetadata()" title="Story metadata" id="btnMeta">&#9432;</button>
        <button class="btn-icon btn-icon-danger" onclick="deleteStory()" title="Delete story" id="btnDelete">&#128465;</button>
      </div>
    </div>

    <div class="page-viewer">
      <div class="page-progress-strip">
        <span class="page-progress-label" id="progressLabel"></span>
        <div class="page-progress-bar"><div class="page-progress-bar-fill" id="progressFill"></div></div>
      </div>

      <div class="page-content" id="pageContent"></div>

      <div class="nav-bar">
        <div class="nav-left">
          <div class="tts-controls">
            <button class="btn-tts" id="btnTts" onclick="toggleSpeech()" title="اقرأ بصوت عالٍ">&#9654;</button>
            <button class="btn-tts-auto ${autoRead ? 'active' : ''}" id="btnAutoRead" onclick="toggleAutoRead()">قراءة تلقائية</button>
          </div>
        </div>

        <div class="nav-center">
          <button class="btn btn-primary" id="btnNext" onclick="nextPage()">&#8592; التالي</button>
          <button class="btn btn-secondary" id="btnPrev" onclick="prevPage()">السابق &#8594;</button>
        </div>

        <div class="nav-right"></div>
      </div>
    </div>

    <div class="metadata-panel" id="metadataPanel">
      <div class="metadata-header">
        <h3>Story Details</h3>
        <button class="metadata-close" onclick="toggleMetadata()">&#10005;</button>
      </div>
      <div class="metadata-body">
        ${renderMetadata(s)}
      </div>
    </div>
  `;

  renderPage();
}

function renderPage() {
  const s = stories[currentStoryIndex];
  const page = s.story.story_pages[currentPage];
  const total = s.story.story_pages.length;
  const pageContent = document.getElementById('pageContent');
  const card = pageContent.querySelector('.page-card');

  const illClass = showIllustrationNotes ? 'visible' : '';

  const newHtml = `
    <div class="page-card fade-in">
      <div class="page-text-ar">${page.text_arabic}</div>
      <div class="page-text-en">${page.text_english_literal}</div>
      <div class="page-illustration ${illClass}">
        <strong>Illustration:</strong> ${page.illustration_note}
      </div>
    </div>
  `;

  if (card) {
    card.classList.add('fade-out');
    card.classList.remove('fade-in');
    setTimeout(() => {
      pageContent.innerHTML = newHtml;
      if (autoRead) speakCurrentPage();
    }, 200);
  } else {
    pageContent.innerHTML = newHtml;
    if (autoRead) speakCurrentPage();
  }

  document.getElementById('progressLabel').textContent = `${currentPage + 1} / ${total}`;
  document.getElementById('progressFill').style.width = `${((currentPage + 1) / total) * 100}%`;
  document.getElementById('btnPrev').disabled = currentPage === 0;
  document.getElementById('btnNext').disabled = currentPage === total - 1;
}

function nextPage() {
  const s = stories[currentStoryIndex];
  if (currentPage < s.story.story_pages.length - 1) {
    stopSpeech();
    currentPage++;
    renderPage();
  }
}

function prevPage() {
  if (currentPage > 0) {
    stopSpeech();
    currentPage--;
    renderPage();
  }
}

function renderMetadata(s) {
  const m = s.metadata;
  const scores = m.critic_scores || {};
  const revisionClass = m.revision_path || 'direct_approval';

  const revisionLabel = {
    direct_approval: 'Direct Approval',
    light_polish: 'Light Polish',
    substantial_revision: 'Substantial Revision'
  }[revisionClass] || revisionClass;

  const scoreHtml = Object.entries(scores).map(([key, val]) => {
    const label = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    return `
      <div class="score-item">
        <label>${label}</label>
        <div class="score-value">${val} <span class="max">/ 10</span></div>
      </div>
    `;
  }).join('');

  return `
    <div class="meta-section">
      <h4>Generation</h4>
      <div class="meta-field">
        <label>Conflict Template</label>
        <div class="value">${m.selected_template}</div>
      </div>
      <div class="meta-field">
        <label>Lead Character</label>
        <div class="value">${m.lead_character}</div>
      </div>
      <div class="meta-field">
        <label>Catalyst Character</label>
        <div class="value">${m.catalyst_character}</div>
      </div>
      <div class="meta-field">
        <label>Primary Location</label>
        <div class="value">${m.primary_location}</div>
      </div>
      <div class="meta-field">
        <label>Emotional Engine</label>
        <div class="value">${m.emotional_engine}</div>
      </div>
      <div class="meta-field">
        <label>Curiosity Hook</label>
        <div class="value">${m.curiosity_hook || '—'}</div>
      </div>
    </div>

    <div class="meta-section">
      <h4>Pipeline</h4>
      <div class="meta-field">
        <label>Revision Path</label>
        <div><span class="revision-badge ${revisionClass}">${revisionLabel}</span></div>
      </div>
      <div class="meta-field">
        <label>Critic Recommendation</label>
        <div class="value">${(m.critic_recommendation || '—').replace(/_/g, ' ')}</div>
      </div>
      <div class="meta-field">
        <label>Generated</label>
        <div class="value">${new Date(s.generated_at).toLocaleString()}</div>
      </div>
    </div>

    ${scoreHtml ? `
    <div class="meta-section">
      <h4>Critic Scores</h4>
      <div class="scores-grid">${scoreHtml}</div>
    </div>` : ''}
  `;
}

/* ─── TTS ─── */
function speakCurrentPage() {
  const s = stories[currentStoryIndex];
  const page = s.story.story_pages[currentPage];
  stopSpeech();

  const utterance = new SpeechSynthesisUtterance(page.text_arabic);
  utterance.lang = 'ar';
  utterance.rate = 0.9;

  const voices = speechSynthesis.getVoices();
  const arVoice = voices.find(v => v.lang.startsWith('ar'));
  if (arVoice) utterance.voice = arVoice;

  utterance.onstart = () => {
    isSpeaking = true;
    updateTtsButton();
  };

  utterance.onend = () => {
    isSpeaking = false;
    updateTtsButton();
    if (autoRead) {
      const total = s.story.story_pages.length;
      if (currentPage < total - 1) {
        setTimeout(() => nextPage(), 600);
      }
    }
  };

  utterance.onerror = () => {
    isSpeaking = false;
    updateTtsButton();
  };

  speechSynthesis.speak(utterance);
}

function toggleSpeech() {
  if (isSpeaking) {
    stopSpeech();
  } else {
    speakCurrentPage();
  }
}

function stopSpeech() {
  speechSynthesis.cancel();
  isSpeaking = false;
  updateTtsButton();
}

function updateTtsButton() {
  const btn = document.getElementById('btnTts');
  if (!btn) return;
  btn.innerHTML = isSpeaking ? '&#9724;' : '&#9654;';
  btn.classList.toggle('playing', isSpeaking);
  btn.title = isSpeaking ? 'إيقاف القراءة' : 'اقرأ بصوت عالٍ';
}

function toggleAutoRead() {
  autoRead = !autoRead;
  const btn = document.getElementById('btnAutoRead');
  if (btn) btn.classList.toggle('active', autoRead);
}

/* ─── Toggles ─── */
function toggleMetadata() {
  metadataOpen = !metadataOpen;
  const panel = document.getElementById('metadataPanel');
  const btn = document.getElementById('btnMeta');
  if (panel) panel.classList.toggle('open', metadataOpen);
  if (btn) btn.classList.toggle('active', metadataOpen);
}

function toggleIllustrationNotes() {
  showIllustrationNotes = !showIllustrationNotes;
  const note = document.querySelector('.page-illustration');
  const btn = document.getElementById('btnIllNotes');
  if (note) note.classList.toggle('visible', showIllustrationNotes);
  if (btn) btn.classList.toggle('active', showIllustrationNotes);
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
}

/* ─── Keyboard Navigation ─── */
document.addEventListener('keydown', (e) => {
  if (currentStoryIndex < 0) return;
  if (e.key === 'ArrowLeft') nextPage();
  else if (e.key === 'ArrowRight') prevPage();
  else if (e.key === ' ' && e.target === document.body) {
    e.preventDefault();
    toggleSpeech();
  }
});

/* ─── Delete Story ─── */
function deleteStory() {
  if (currentStoryIndex < 0) return;
  const s = stories[currentStoryIndex];
  const title = s.story.title_english || s.story.title_arabic;

  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-dialog">
      <h3>Delete Story</h3>
      <p>Remove <strong>${title}</strong> from the viewer? This can't be undone.</p>
      <div class="actions">
        <button class="btn-cancel" onclick="this.closest('.confirm-overlay').remove()">Cancel</button>
        <button class="btn-danger" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
    const btn = document.getElementById('confirmDeleteBtn');
    btn.textContent = 'Deleting...';
    btn.disabled = true;
    try {
      await pushDeleteToGitHub(currentStoryIndex);
      overlay.remove();
      stories.splice(currentStoryIndex, 1);
      currentStoryIndex = -1;
      currentPage = 0;
      renderStoryList();
      if (stories.length > 0) {
        selectStory(0);
      } else {
        mainEl.innerHTML = '<div class="main-empty"><div class="icon">&#128218;</div><p>No stories yet</p></div>';
      }
    } catch (err) {
      overlay.remove();
      alert('Delete failed: ' + err.message);
    }
  });
}

function getGitHubToken() {
  let token = localStorage.getItem('gh_token_booma');
  if (token) return Promise.resolve(token);

  return new Promise((resolve, reject) => {
    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML = `
      <div class="confirm-dialog">
        <h3>GitHub Token</h3>
        <p>To delete stories, enter a GitHub token with write access to the story-viewer repo. This is stored only in your browser.</p>
        <input type="password" class="token-input" id="tokenInput" placeholder="ghp_... or gho_...">
        <div class="token-hint">Create one at github.com → Settings → Developer settings → Personal access tokens</div>
        <div class="actions">
          <button class="btn-cancel" id="tokenCancel">Cancel</button>
          <button class="btn-danger" style="background:var(--accent)" id="tokenSave">Save</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    document.getElementById('tokenInput').focus();
    document.getElementById('tokenCancel').addEventListener('click', () => { overlay.remove(); reject(new Error('Cancelled')); });
    document.getElementById('tokenSave').addEventListener('click', () => {
      const val = document.getElementById('tokenInput').value.trim();
      if (!val) return;
      localStorage.setItem('gh_token_booma', val);
      overlay.remove();
      resolve(val);
    });
    document.getElementById('tokenInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('tokenSave').click();
    });
  });
}

async function pushDeleteToGitHub(indexToRemove) {
  const token = await getGitHubToken();
  const apiUrl = 'https://api.github.com/repos/Booma-Kids-Academy/story-viewer/contents/stories.json';
  const headers = {
    'Authorization': `Bearer ${token}`,
    'Accept': 'application/vnd.github.v3+json',
    'User-Agent': 'booma-viewer'
  };

  const getRes = await fetch(apiUrl + '?ref=main', { headers });
  if (!getRes.ok) {
    if (getRes.status === 401 || getRes.status === 403) {
      localStorage.removeItem('gh_token_booma');
      throw new Error('Invalid token. Try deleting again to re-enter it.');
    }
    throw new Error('Failed to read stories: ' + getRes.status);
  }

  const data = await getRes.json();
  const sha = data.sha;
  const current = JSON.parse(atob(data.content));
  current.splice(indexToRemove, 1);

  const putRes = await fetch(apiUrl, {
    method: 'PUT',
    headers: { ...headers, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      message: `Remove story at index ${indexToRemove}`,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(current, null, 2)))),
      sha,
      branch: 'main'
    })
  });

  if (!putRes.ok) {
    if (putRes.status === 401 || putRes.status === 403) {
      localStorage.removeItem('gh_token_booma');
      throw new Error('Token lacks write access. Try deleting again to re-enter it.');
    }
    throw new Error('Failed to push: ' + putRes.status);
  }
}

speechSynthesis.onvoiceschanged = () => {};
loadStories();
